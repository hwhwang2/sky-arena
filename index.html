<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Triple Dogfight</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700;800&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root{ --red: #FF4B4B; --red-dark:#B22E2E; --blue: #3AA0FF; --blue-dark:#1F5FA8; --green: #4CD97B; --green-dark:#2E8F4E; --cream: #F4F1EA; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ margin:0; padding:0; width:100%; height:100%; overflow:hidden; overscroll-behavior:none; touch-action:none; background:#0A0E1C; font-family:'Fredoka', system-ui, sans-serif; }
  #stage{ position:fixed; inset:0; }
  canvas{ display:block; width:100%; height:100%; touch-action:none; }
  .overlay{ position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; color:var(--cream); gap:14px; padding:24px; background:rgba(6,8,18,0.88); backdrop-filter: blur(3px); z-index:10; }
  .overlay.hidden{ display:none; }
  .title{ font-size:30px; font-weight:800; margin:2px 0; }
  .authors{ font-size:14px; font-weight:600; color:var(--cream); opacity:0.7; margin-bottom:10px; }
  .btn{ font-family:'Fredoka', sans-serif; font-weight:700; font-size:17px; color:#0E1120; border:none; border-radius:999px; padding:14px 34px; cursor:pointer; background: var(--cream); }
</style>
</head>
<body>
<div id="stage">
  <canvas id="game"></canvas>
  <div id="startOverlay" class="overlay">
    <h1 class="title">Triple Dogfight</h1>
    <div class="authors">By Max Hwang & Hoho Hwang</div>
    <button class="btn" id="startBtn">Start Battle</button>
  </div>
</div>
<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  let W, H, DPR, CX, CY, ARENA_R;
  const BASE_PLANE_R = 20, FRICTION = 0.987, MIN_SPEED = 0.35, MAX_DRAG = 190, BASE_MAX_SPEED = 30, BLAST_RADIUS = 64;

  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2.5);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    CX = W/2; CY = H/2; ARENA_R = Math.min(W,H) * 0.42;
  }
  window.addEventListener('resize', resize);
  resize();

  const TEAM_DEFS = {
    red:   { id:'red', name:'Red Falcons', color:'#FF4B4B', maxHp:3, speedMult:1.0, ability:'explosive' },
    green: { id:'green', name:'Green Bulldogs', color:'#4CD97B', maxHp:4, speedMult:0.42, ability:'poop' },
    blue:  { id:'blue', name:'Blue Needles', color:'#3AA0FF', maxHp:2, speedMult:1.25, ability:'multihit' }
  };

  let TEAMS = ['red','green','blue'].map((id, i) => Object.assign({angle: -Math.PI/2 + i * (2*Math.PI/3)}, TEAM_DEFS[id]));
  let planes = [], items = [], currentTeamIdx = 0, phase = 'idle';

  function makePlanes(){
    planes = TEAMS.flatMap(t => [-14,0,14].map(off => ({
      owner: t.id, x: CX + Math.cos(t.angle + off*Math.PI/180)*ARENA_R, y: CY + Math.sin(t.angle + off*Math.PI/180)*ARENA_R,
      vx:0, vy:0, alive:true, hp: t.maxHp, moving:false
    })));
  }

  function updatePhysics(){
    for (const p of planes.filter(p => p.alive && p.moving)){
      p.x += p.vx; p.y += p.vy; p.vx *= FRICTION; p.vy *= FRICTION;
      if (Math.hypot(p.vx, p.vy) < MIN_SPEED){ p.vx=p.vy=0; p.moving=false; switchTurn(); }
      
      items.forEach((item, i) => {
        if (item.type === 'poop' && Math.hypot(p.x-item.x, p.y-item.y) < 20 && p.owner !== item.owner){
          p.hp -= 0.1;
          if (p.hp <= 0){ p.alive = false; p.vx=p.vy=0; p.moving=false; items.splice(i,1); switchTurn(); }
        }
      });
      
      if (p.moving && TEAM_DEFS[p.owner].ability === 'poop'){
        if (!p.lastPoopX || Math.hypot(p.x - p.lastPoopX, p.y - p.lastPoopY) >= 60){
          p.lastPoopX = p.x; p.lastPoopY = p.y;
          items.push({ x:p.x, y:p.y, type:'poop', owner:p.owner });
        }
      }
    }
  }

  function switchTurn(){ currentTeamIdx = (currentTeamIdx + 1) % TEAMS.length; }

  function loop(){
    if (phase === 'flying') updatePhysics();
    requestAnimationFrame(loop);
  }
  
  document.getElementById('startBtn').addEventListener('click', () => { makePlanes(); phase='flying'; document.getElementById('startOverlay').classList.add('hidden'); });
  loop();
})();
</script>
</body>
</html>
